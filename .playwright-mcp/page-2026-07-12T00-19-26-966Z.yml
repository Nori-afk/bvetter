            - paragraph [ref=f1e561]: "Our Advanced Forecast predicts 23.8 cases next month. Risk level: High (Low: under 165 · Medium: up to 197.5). Risk classification uses simple, verifiable thresholds on case count (< p50 = Low, p50-p75 = Medium, >= p75 = High, computed fresh from the current cases across all barangays each request) instead of a trained ML classifier. Source data shows risk_class barely overlaps by volume (Low ~9 cases, Medium 10-17, High 16-30), so a threshold rule matches the ground truth directly and can't misclassify a high-volume barangay as low risk the way a classifier trained without volume features could. The regressor (used only for the MAE/RMSE/MAPE accuracy metrics below, not for forecasts or risk) trains on 3 live row(s) from patient_visit_records beyond the Excel snapshot's latest month. Of those, only 0 feed the ARIMA/SARIMA series -- ARIMA only trusts a live month once it forms an unbroken run right after the Excel snapshot's last month, since a single sparse or gap-broken month at the tail of the series would otherwise crater the forecast (a real example: one under-logged month misread as 'cases collapsed to near zero')."
